# cargo-deny configuration for ad1-forensic.
# https://embarkstudios.github.io/cargo-deny/
#
# The dependency tree is pure-Rust (flate2 rust_backend, thiserror, RustCrypto
# md-5/sha1, forensicnomicon) — no C-license surprises.

[graph]
targets = []
all-features = false
no-default-features = false

[advisories]
unmaintained = "workspace"
ignore = []

[licenses]
# Permissive only.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
