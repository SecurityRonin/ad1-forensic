name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-features
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - run: cargo fmt --check

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@a402910a723481c4c80d006d75298c796a9c8695 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov
      # Hard gate: 100% function coverage (line gaps are DoS backstops marked
      # `cov:unreachable`, exercised by fuzz). testfix.rs is the fixture builder.
      - name: Coverage (functions 100%)
        run: >
          cargo llvm-cov --workspace --features testfix
          --ignore-filename-regex 'testfix\.rs'
          --fail-under-functions 100 --show-missing-lines

  check-msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@1.85.0
      # Published-library MSRV promise (default features, no testfix).
      - run: cargo check -p ad1-core
      - run: cargo check -p ad1-forensic

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@a402910a723481c4c80d006d75298c796a9c8695
        with:
          tool: cargo-deny
      - run: cargo deny check

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history for the secret scan
      # Use the gitleaks BINARY (MIT, free) directly — the gitleaks-action wrapper
      # now requires a paid license for organizations.
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Scan for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact
