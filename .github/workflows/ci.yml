name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo test --workspace --all-features
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - run: cargo fmt --check

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@a402910a723481c4c80d006d75298c796a9c8695 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov
      # Hard gate: 100% function coverage (line gaps are DoS backstops marked
      # `cov:unreachable`, exercised by fuzz). testfix.rs is the fixture builder.
      - name: Coverage (functions 100%)
        run: >
          cargo llvm-cov --workspace --features testfix
          --ignore-filename-regex 'testfix\.rs'
          --fail-under-functions 100 --show-missing-lines

  check-msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@1.85.0
      # Published-library MSRV promise (default features, no testfix).
      - run: cargo check -p ad1-core
      - run: cargo check -p ad1-forensic

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@a402910a723481c4c80d006d75298c796a9c8695
        with:
          tool: cargo-deny
      - run: cargo deny check

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.6
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
