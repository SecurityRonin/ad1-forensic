name: Release

# Tag-driven publish of the AD1 library crates (no binaries / distribution
# channels — this repo ships libraries only). Push a signed `vX.Y.Z` tag.
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-features
      # Publish the reader first; the auditor depends on it.
      - name: Publish ad1-core
        run: cargo publish -p ad1-core --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - name: Wait for crates.io to index ad1-core
        run: sleep 30
      - name: Publish ad1-forensic
        run: cargo publish -p ad1-forensic --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.0.8
        with:
          generate_release_notes: true
