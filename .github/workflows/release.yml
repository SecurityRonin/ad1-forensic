name: Release

# Tag-driven publish of the AD1 library crates (no binaries / distribution
# channels — this repo ships libraries only). Push a signed `vX.Y.Z` tag.
on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-features
      # Publish the reader first; the auditor depends on it. Each step is
      # idempotent: skip if that exact version is already on crates.io (so a tag
      # for an already-published version yields a green run, not a failure).
      - name: Publish ad1-core
        run: |
          v=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if curl -sf -A "ad1-forensic-release" "https://crates.io/api/v1/crates/ad1-core/$v" >/dev/null; then
            echo "ad1-core $v already published — skipping"
          else
            cargo publish -p ad1-core --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
            sleep 30 # let crates.io index before the dependent publish
          fi
      - name: Publish ad1-forensic
        run: |
          v=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if curl -sf -A "ad1-forensic-release" "https://crates.io/api/v1/crates/ad1-forensic/$v" >/dev/null; then
            echo "ad1-forensic $v already published — skipping"
          else
            cargo publish -p ad1-forensic --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
          fi

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.0.8
        with:
          generate_release_notes: true
